_schema-version: "3.3"
ID: scn-badges
version: 5.4.4
modules:
  - name: scn-badges-srv
    type: nodejs
    path: srv
    parameters:
      buildpack: nodejs_buildpack
      disk-quota: 4048M 
    provides:
      - name: srv-api # required by consumers of services (e.g. approuter)
        properties:
          srv-url: ${default-url}
    build-parameters:
      ignore: ["/node_modules", "/app/profile-vue/node_modules", "/app/profile-vue/src", "/app/profile-vue/tests", "/app/profile-vue/scripts", "/app/profile-vue/.vite", "/app/profile-vue/test-results", "/app/profile-vue/playwright-report"]
      supported-platform: [CF]
