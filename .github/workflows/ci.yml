name: CI
# Runs on every PR to main. Lints + tests Express, builds + tests the Vue SPA
# (vitest + Playwright e2e), and validates the MTA build. See PR #50 for
# rationale (Vue tests were absent from CI before, which let PR #28 ship a
# blank-page regression to prod).

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install MTA Build Tool
        run: npm install -g mbt

      - name: Install Express dependencies
        run: npm ci
        working-directory: srv

      - name: Install Vue SPA dependencies
        run: npm ci
        working-directory: srv/app/profile-vue

      - name: Lint Express
        run: npx eslint .
        working-directory: srv

      - name: Vue unit tests (Vitest)
        run: npm test
        working-directory: srv/app/profile-vue

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: srv/app/profile-vue

      - name: Vue end-to-end tests (Playwright)
        run: npm run test:e2e
        working-directory: srv/app/profile-vue
        env:
          # Playwright's webServer runs `npm --prefix ../.. run build:vue && npm --prefix ../.. start`,
          # which builds the SPA and boots Express. CI=true tells Playwright not to
          # reuse an existing server (we want a fresh one).
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: srv/app/profile-vue/playwright-report/
          retention-days: 7

      - name: Validate MTA build
        run: mbt build --mtar archive
